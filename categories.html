<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#070A12" />
  <title>PUNO — Kategori</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="noise"></div></div>
  <a class="skip-link" href="#main">Skip</a>

  <header class="topbar" role="banner">
    <div class="container topbar__inner">
      <a class="brand" href="index.html" aria-label="PUNO Home">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 42V22c0-2.2 1.8-4 4-4h16" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            <path d="M44 22v20c0 2.2-1.8 4-4 4H24" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            <path d="M24 26h16M24 38h16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="brand__name">PUNO</span>
        <span class="brand__tag">Kategori</span>
      </a>
      <nav class="nav" aria-label="Kryesore">
        <a class="nav__link" href="jobs.html">Punë</a>
        <a class="nav__link" href="companies.html">Kompani</a>
        <a class="nav__link" href="login.html">Hyr</a>
      </nav>
      <button class="burger" type="button" aria-label="Hap menunë" aria-expanded="false" data-burger>
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-nav" data-mobile-nav>
      <div class="container mobile-nav__inner">
        <a class="nav__link" href="jobs.html">Punë</a>
        <a class="nav__link" href="companies.html">Kompani</a>
        <a class="nav__link nav__link--cta" href="login.html">Hyr</a>
      </div>
    </div>
  </header>

  <main id="main" class="section" style="padding-top:18px">
    <div class="container">
      <div class="section__head" style="margin-bottom:18px">
        <div>
          <h1 class="h1" style="font-size:clamp(28px,3.4vw,42px);">Kategoritë kryesore</h1>
          <p class="lead" style="margin-top:10px">Kliko një kategori për të filtruar punët (simulim me lidhje).</p>
        </div>
      </div>

      <div class="cards cards--3" style="grid-template-columns: repeat(3, minmax(0,1fr));" data-list="cats"></div>
    </div>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="container footer__grid">
      <div><div class="footer-brand"><span class="brand__name">PUNO</span><span class="footer-brand__sub">Premium job platformë</span></div></div>
      <div><div class="footer-col__title">Faqe</div><a class="footer-link" href="jobs.html">Punë</a><a class="footer-link" href="companies.html">Kompani</a></div>
      <div><div class="footer-col__title">Kontakt</div><a class="footer-link" href="contact.html">Na shkruaj</a></div>
      <div><div class="footer-col__title">Llogaria</div><a class="footer-link" href="register.html">Regjistrohu</a></div>
    </div>
    <div class="footer-bottom"><div class="container footer-bottom__inner"><span class="muted">© <span id="year"></span> PUNO.</span></div></div>
  </footer>

  <script src="app.js" defer></script>
  <script>
    const cats = [
      {k:'IT', t:'Zhvillim & Integrime', icon:'🧩'},
      {k:'Marketing', t:'Marketing & Digjital', icon:'📣'},
      {k:'Financa', t:'Kontabilitet & Analizë', icon:'📊'},
      {k:'Dizajn', t:'Branding & Kreativitet', icon:'🎨'},
      {k:'Sales', t:'Shitje & Biznes', icon:'🤝'},
      {k:'Menaxhim', t:'Menaxhim Projekte', icon:'🧠'}
    ];
    const el = document.querySelector('[data-list="cats"]');
    if(el){
      el.innerHTML = cats.map(c=>`
        <a class="card" href="jobs.html?cat=${encodeURIComponent(c.k)}">
          <div class="card__top">
            <div class="tag">${c.icon} ${c.k}</div>
            <div class="tag tag--money">Shiko</div>
          </div>
          <div class="card__title" style="margin-top:12px">${c.t}</div>
          <div class="card__meta">Pozicione të reja çdo javë • Kosovë & Shqipëri</div>
        </a>
      `).join('');
    }
    const yearEl=document.getElementById('year'); if(yearEl) yearEl.textContent=new Date().getFullYear();
  </script>
</body>
</html>
